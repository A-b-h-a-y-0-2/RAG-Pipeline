<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix SROP | AI Orchestration Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lightweight Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --accent-primary: #7c4dff;
            --accent-secondary: #00e5ff;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --glass-bg: rgba(20, 20, 20, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --user-bubble: #1a1a1a;
            --agent-bubble: #252525;
            --sidebar-width: 350px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: radial-gradient(circle at top right, #1a1033 0%, #050505 60%);
        }

        /* Sidebar - Trace View */
        aside {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .sidebar-header h2 span { color: var(--accent-secondary); }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.05); color: #ff4d4d; }

        .trace-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .trace-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .trace-label {
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        .trace-value { color: var(--accent-secondary); word-break: break-all; }

        /* Main Chat Area */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .chat-header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4d4d; }
        .status-dot.online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .message {
            max-width: 85%;
            padding: 20px;
            border-radius: 20px;
            line-height: 1.6;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--agent-bubble);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message .author {
            font-size: 0.7rem;
            color: var(--accent-primary);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 0.5px;
        }

        /* Markdown Styling */
        .message p { margin-bottom: 12px; }
        .message p:last-child { margin-bottom: 0; }
        .message ul, .message ol { margin-left: 20px; margin-bottom: 12px; }
        .message li { margin-bottom: 6px; }
        .message strong { color: #fff; font-weight: 700; }
        .message code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--accent-secondary);
        }
        .message pre {
            background: rgba(0,0,0,0.5);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .message blockquote {
            border-left: 3px solid var(--accent-primary);
            padding-left: 15px;
            color: var(--text-muted);
            font-style: italic;
        }

        .citation {
            color: var(--accent-secondary);
            font-weight: 600;
            background: rgba(0, 229, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin: 0 2px;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        /* Input Area */
        .chat-input-wrapper {
            padding: 30px 40px 50px;
            background: linear-gradient(transparent, var(--bg-color));
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }
        .input-container:focus-within { border-color: var(--accent-primary); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px 20px;
            font-size: 1rem;
            outline: none;
        }

        button#sendBtn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button#sendBtn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(124, 77, 255, 0.4); }
        button#sendBtn:active { transform: translateY(0); }
        button#sendBtn:disabled { opacity: 0.5; filter: grayscale(1); }

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            40% { color: white; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .5em 0 0 white, 1em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .5em 0 0 white, 1em 0 0 white; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">
            <h2>HELIX <span>TRACE</span></h2>
            <button class="clear-btn" onclick="clearSession()">RESET</button>
        </div>
        <div class="trace-content" id="tracePanel">
            <div style="color: var(--text-muted); font-style: italic;">No trace data yet.</div>
        </div>
    </aside>

    <main>
        <div class="chat-header">
            <h1>Helix AI Concierge</h1>
            <div class="api-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">API OFFLINE</span>
            </div>
        </div>

        <div class="chat-messages" id="messageBox">
            <!-- Messages load from localStorage -->
        </div>

        <div class="chat-input-wrapper">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Ask about deploy keys, account status, or builds..." autocomplete="off">
                <button id="sendBtn">
                    <span>Send</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:8000";
        let sessionId = localStorage.getItem('helix_session_id');
        let chatHistory = JSON.parse(localStorage.getItem('helix_chat_history') || '[]');
        let lastTrace = JSON.parse(localStorage.getItem('helix_last_trace') || 'null');

        const messageBox = document.getElementById('messageBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const tracePanel = document.getElementById('tracePanel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Setup Markdown
        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function(code) { return code; }
        });

        // Initialize UI
        function init() {
            renderHistory();
            if (lastTrace) updateTraceUI(lastTrace);
            checkHealth();
            if (chatHistory.length === 0) {
                appendMessage("System", "Welcome to the Helix SROP Demo. I am an agentic orchestration pipeline. How can I assist you with your Helix account or documentation today?", "agent", false);
            }
        }

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/healthz`);
                if (res.ok) {
                    statusDot.classList.add('online');
                    statusText.innerText = "API ONLINE";
                }
            } catch (e) {
                statusDot.classList.remove('online');
                statusText.innerText = "API OFFLINE";
            }
        }

        async function initSession() {
            try {
                const res = await fetch(`${API_BASE}/v1/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: "demo_user", plan_tier: "pro" })
                });
                const data = await res.json();
                sessionId = data.session_id;
                localStorage.setItem('helix_session_id', sessionId);
            } catch (e) {
                console.error("Session init failed");
            }
        }

        function clearSession() {
            localStorage.clear();
            location.reload();
        }

        function renderHistory() {
            messageBox.innerHTML = '';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.type}`;
                let html = marked.parse(msg.text);
                // Highlight citations
                html = html.replace(/\[([a-z0-9_-]+_[a-f0-9]{16})\]/g, '<span class="citation">$1</span>');
                div.innerHTML = `<span class="author">${msg.author}</span>${html}`;
                messageBox.appendChild(div);
            });
            messageBox.scrollTop = messageBox.scrollHeight;
        }

        function appendMessage(author, text, type, save = true) {
            if (save) {
                chatHistory.push({ author, text, type });
                localStorage.setItem('helix_chat_history', JSON.stringify(chatHistory));
            }
            renderHistory();
        }

        function updateTraceUI(trace) {
            localStorage.setItem('helix_last_trace', JSON.stringify(trace));
            tracePanel.innerHTML = `
                <div class="trace-card">
                    <div class="trace-label">Trace ID</div>
                    <div class="trace-value">${trace.trace_id}</div>
                </div>
                <div class="trace-card">
                    <div class="trace-label">Routed To</div>
                    <div class="trace-value" style="color:var(--accent-primary)">${trace.routed_to.toUpperCase()}</div>
                </div>
                <div class="trace-card">
                    <div class="trace-label">Latency</div>
                    <div class="trace-value">${trace.latency_ms}ms</div>
                </div>
                <div class="trace-card">
                    <div class="trace-label">Retrieved Chunks</div>
                    <div class="trace-value" style="font-size:0.7rem">
                        ${trace.retrieved_chunk_ids.map(id => `<div style="margin-bottom:4px">▪ ${id}</div>`).join('') || 'None'}
                    </div>
                </div>
                <div class="trace-card">
                    <div class="trace-label">Primary Tool</div>
                    <div class="trace-value">${trace.tool_calls[0]?.tool_name || 'N/A'}</div>
                </div>
            `;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            if (!sessionId) await initSession();

            appendMessage("You", text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "message agent";
            loadingDiv.innerHTML = '<span class="author">Concierge</span><span class="loading-dots">Orchestrating Specialist</span>';
            messageBox.appendChild(loadingDiv);
            messageBox.scrollTop = messageBox.scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/v1/chat/${sessionId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text })
                });
                
                const data = await res.json();
                messageBox.removeChild(loadingDiv);

                if (data.reply) {
                    appendMessage(data.routed_to || "Agent", data.reply, "agent");
                }

                if (data.trace_id) {
                    const tRes = await fetch(`${API_BASE}/v1/traces/${data.trace_id}`);
                    const tData = await tRes.json();
                    updateTraceUI(tData);
                }

            } catch (e) {
                if (loadingDiv.parentNode) messageBox.removeChild(loadingDiv);
                appendMessage("Error", "Pipeline offline. Ensure backend is running at port 8000.", "agent");
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
        
        window.onload = init;
    </script>
</body>
</html>
